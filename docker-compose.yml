version: "3.9"
services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/app
    environment:
      - DOCKER_IMAGE=macgats-sandbox:latest
    depends_on:
      - sandbox-image
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "8501:8501"
    depends_on:
      - api

  sandbox-image:
    image: macgats-sandbox:latest
    build:
      context: .
      dockerfile: docker/Dockerfile.sandbox
